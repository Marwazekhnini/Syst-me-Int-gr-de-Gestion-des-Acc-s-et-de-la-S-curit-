<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Door Security</title>
    <style>
        /* The Black and Red High-Tech Theme! */
        body {
            background-color: #121212; /* Deep Black/Gray */
            color: #ffffff; /* White text */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            width: 1600px;
            margin: 100px auto;
        }
        .card {
            background-color: #1e1e1e; /* Slightly lighter black */
            padding: 30px;
            border-top: 5px solid #d32f2f; /* Blood Red Accent */
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.2); /* Red Glow */
        }
        h2 { text-align: center; color: #d32f2f; }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px 0;
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: white;
            box-sizing: border-box;
        }
        .btn {
            width: 100%;
            background-color: #d32f2f; /* Red button */
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:hover { background-color: #b71c1c; /* Darker red on hover */ }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
