{% extends 'security/base.html' %}

{% block content %}
<div class="card">
    <h2>SYSTEM LOGIN</h2>
    
    {% if messages %}
        {% for message in messages %}
            <p style="color: #ff5252; text-align: center; font-weight: bold;">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        
        <label>Username</label>
        <input type="text" name="username" required>
        
        <label>Password</label>
        <input type="password" name="password" required>
        
        <label>Log in as:</label>
        <select name="role" style="width: 100%; padding: 10px; margin: 10px 0 20px 0; background-color: #2c2c2c; border: 1px solid #444; color: white; border-radius: 4px;">
            <option value="security">Security Man</option>
            <option value="employee">Standard Employee</option>
        </select>
        
        <button type="submit" class="btn">Authenticate</button>
    </form>
    
    <p style="text-align: center; margin-top: 20px; font-size: 14px;">
        Need system access? <br>
        <a href="{% url 'register' %}" style="color: #d32f2f; text-decoration: none; font-weight: bold;">Click here for Inscription</a>
    </p>
</div>
{% endblock %}
